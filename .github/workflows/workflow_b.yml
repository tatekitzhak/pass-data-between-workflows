name: Workflow B

on:
  
  # push:
  #   branches: [ "main" ]
  workflow_run:
    workflows: ["Workflow A"]
    types: 
     - completed
     
  workflow_dispatch:

jobs:
  
  # run_on_workflow_a_success:
  #   permissions:
  #     contents: write
  #     issues: write
  #     pull-requests: write

  #   runs-on: ubuntu-latest
  #   steps:
  #     # Runs a single command using the runners shell
  #     - name: Run a Workflow A success
  #       run: echo "Hello, world orkflow B!"

  download_ec2_instance_artifact:
    permissions:
      contents: write
      issues: write
      pull-requests: write

    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Get latest Run ID
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list --workflow "Workflow A" --status success --limit 1 --json databaseId --jq '.[0].databaseId')

          # Check if RUN_ID is empty or "null"
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" == "null" ]; then
            echo "::error::No successful runs of 'Workflow A' found. Please run Workflow A first."
            exit 1
          fi

          echo "LATEST_RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Found Run ID; $RUN_ID"

      - name: Download artifact
        uses: actions/github-script@v8
        with:
          script: |
            console.log('process.env.LATEST_RUN_ID:', process.env.LATEST_RUN_ID)
            const run_id = Number(process.env.LATEST_RUN_ID);

            let allArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run_id,
            });

            console.log('allArtifacts: ',allArtifacts)


            let matchArtifact = allArtifacts.data.artifacts.filter((artifact) => {
              return artifact.name == "ec2_instance.json"
            })[0];

            console.log('matchArtifact: ',matchArtifact)

            let downloadArtifact = await github.rest.actions.downloadArtifact({
              owner: context.repo.owner,
              repo: context.repo.repo,
              artifact_id: matchArtifact.id,
              archive_format: 'zip',
            });

            console.log('downloadArtifact: ',downloadArtifact)
      
            let fs = require('fs');
            fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/ec2_instance.zip`, Buffer.from(downloadArtifact.data));

      - name: Unzip artifact
        run: |
          pwd
          ls 
          unzip ec2_instance.zip

      - name: Return parsed JSON
        uses: actions/github-script@v8
        id: return-parsed-json
        with:
          script: |
            let fs = require('fs');
            let data = fs.readFileSync('./ec2_instance.json');
            return JSON.parse(data);

    outputs:
      ec2_instance_id: ${{ fromJSON(steps.return-parsed-json.outputs.result).ec2_instance_id }} 
      aws_region: ${{ fromJSON(steps.return-parsed-json.outputs.result).aws_region }}

  log_ec2_instance_values:
    permissions:
      contents: write
      issues: write
      pull-requests: write

    needs:
      - download_ec2_instance_artifact
    runs-on: ubuntu-latest
    steps:
      - name: Log Context Values
        run: |
          echo "${{ needs.download_ec2_instance_artifact.outputs.ec2_instance_id }}"
          echo "${{ needs.download_ec2_instance_artifact.outputs.aws_region }}"